<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${property.id != null ? 'Редактирование объекта' : 'Новый объект'} + ' | Nova Estate'"></title>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="re-shell">

<nav class="re-navbar" sec:authorize="isAuthenticated()">
    <div class="re-navbar-inner">
        <a class="re-logo" th:href="@{/}">
            <div class="re-logo-mark"></div>
            <span>Nova Estate</span>
        </a>
        <div class="re-nav-links">
            <a class="re-nav-link" th:href="@{/}">Главная</a>
            <a class="re-nav-link re-nav-link-active" th:href="@{/web/properties}">Объекты</a>
            <a class="re-nav-link" th:href="@{/web/clients}">Клиенты</a>
            <a class="re-nav-link" th:href="@{/web/agents}">Агенты</a>
            <a class="re-nav-link" th:href="@{/web/deals}">Сделки</a>
        </div>
    </div>
</nav>

<main class="re-main" sec:authorize="isAuthenticated()">
    <section class="re-page-heading">
        <div>
            <a th:href="@{/web/properties}" class="re-link-back">← К каталогу</a>
            <div class="re-page-title" th:text="${property.id != null ? 'Редактирование объекта' : 'Добавить объект'}">
                Новый объект
            </div>
            <div class="re-page-subtitle">Заполните данные недвижимости</div>
        </div>
    </section>

    <section class="re-card">
        <form th:action="${property.id != null} ? @{/web/properties/{id}/edit(id=${property.id})} : @{/web/properties}"
              th:method="post" th:object="${property}">
            <input type="hidden" th:field="*{id}" th:if="${property.id != null}"/>
            <div class="re-form-grid">
                <div class="re-form-group">
                    <label class="re-field-label">Название *</label>
                    <input type="text" class="re-input" th:field="*{title}" required/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Город *</label>
                    <input type="text" class="re-input" th:field="*{city}" required/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Район</label>
                    <select class="re-input" name="districtId">
                        <option value="">— не выбран —</option>
                        <option th:each="d : ${districts}" th:value="${d.id}"
                                th:text="${d.name}"
                                th:selected="${property.district != null && property.district.id == d.id}">Район</option>
                    </select>
                </div>
                <div class="re-form-group re-form-group-full">
                    <label class="re-field-label">Адрес *</label>
                    <input type="text" class="re-input" th:field="*{address}" required/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Тип *</label>
                    <select class="re-input" name="propertyTypeId" required>
                        <option value="">— выберите тип —</option>
                        <option th:each="t : ${propertyTypes}" th:value="${t.id}"
                                th:text="${t.name}"
                                th:selected="${property.propertyType != null && property.propertyType.id == t.id}">Тип</option>
                    </select>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Цена (₽) *</label>
                    <input type="number" class="re-input" th:field="*{price}" min="0" step="100000" required/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Площадь (м²)</label>
                    <input type="number" class="re-input" th:field="*{area}" min="0" step="0.1"/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Спальни</label>
                    <input type="number" class="re-input" th:field="*{bedrooms}" min="0"/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Санузлы</label>
                    <input type="number" class="re-input" th:field="*{bathrooms}" min="0"/>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Статус</label>
                    <select class="re-input" th:field="*{status}">
                        <option value="AVAILABLE">Доступен</option>
                        <option value="VIEWING_SCHEDULED">На просмотре</option>
                        <option value="UNDER_CONTRACT">В договоре</option>
                        <option value="SOLD">Продан</option>
                        <option value="RENTED">Сдан в аренду</option>
                    </select>
                </div>
                <div class="re-form-group">
                    <label class="re-field-label">Агент</label>
                    <select class="re-input" name="agentId">
                        <option value="">— не назначен —</option>
                        <option th:each="a : ${agents}" th:value="${a.id}"
                                th:text="${a.firstName + ' ' + a.lastName}"
                                th:selected="${property.agent != null && property.agent.id == a.id}">Агент</option>
                    </select>
                </div>
                <div class="re-form-group re-form-group-full">
                    <label class="re-field-label">Описание</label>
                    <textarea class="re-input re-textarea" th:field="*{description}" rows="4"></textarea>
                </div>
            </div>
            <div class="re-form-actions">
                <button type="submit" class="re-btn-primary">Сохранить</button>
                <a th:href="@{/web/properties}" class="re-btn-secondary">Отмена</a>
            </div>
        </form>
    </section>
</main>

<footer class="re-footer" sec:authorize="isAuthenticated()">
    Nova Estate · внутренняя панель агентства недвижимости
</footer>

</body>
</html>
